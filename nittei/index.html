<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あそぼ — 日程調整</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3352;
  --text: #e8eaf6;
  --muted: #6b7299;
  --accent: #7c6af7;
  --accent2: #f76a8c;
  --ok: #4ade80;
  --ng: #f87171;
  --maybe: #fbbf24;
  --ok-bg: rgba(74,222,128,0.1);
  --ng-bg: rgba(248,113,113,0.1);
  --maybe-bg: rgba(251,191,36,0.1);
  --gcal: #4285f4;
}

- { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: ‘Zen Kaku Gothic New’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
}

/* Animated background */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 60% 40% at 15% 20%, rgba(124,106,247,0.12) 0%, transparent 60%),
radial-gradient(ellipse 50% 60% at 85% 80%, rgba(247,106,140,0.08) 0%, transparent 55%);
pointer-events: none;
z-index: 0;
}

/* ===== HEADER ===== */
header {
position: sticky;
top: 0;
z-index: 200;
background: rgba(15,17,23,0.85);
backdrop-filter: blur(16px);
border-bottom: 1px solid var(–border);
padding: 0 1.5rem;
height: 58px;
display: flex;
align-items: center;
justify-content: space-between;
}

.logo {
font-family: ‘Nunito’, sans-serif;
font-weight: 900;
font-size: 1.4rem;
background: linear-gradient(135deg, var(–accent), var(–accent2));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
letter-spacing: -0.02em;
}

.logo span { font-size: 1rem; opacity: 0.7; }

.header-right { display: flex; align-items: center; gap: 0.8rem; }

.gcal-btn {
display: flex;
align-items: center;
gap: 0.5rem;
padding: 0.4rem 0.9rem;
background: rgba(66,133,244,0.15);
border: 1px solid rgba(66,133,244,0.4);
border-radius: 8px;
color: #7ab3ff;
font-size: 0.75rem;
cursor: pointer;
transition: all 0.2s;
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
}
.gcal-btn:hover { background: rgba(66,133,244,0.25); border-color: rgba(66,133,244,0.7); }
.gcal-btn.connected { background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.4); color: var(–ok); }

.gcal-icon {
width: 16px; height: 16px;
border-radius: 3px;
background: linear-gradient(135deg, #4285f4, #34a853, #fbbc05, #ea4335);
flex-shrink: 0;
}

.tab-group {
display: flex;
background: var(–surface);
border-radius: 10px;
padding: 3px;
gap: 2px;
border: 1px solid var(–border);
}

.tab-btn {
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
font-size: 0.75rem;
padding: 0.35rem 0.9rem;
border: none;
background: transparent;
color: var(–muted);
border-radius: 7px;
cursor: pointer;
transition: all 0.2s;
}
.tab-btn.active { background: var(–accent); color: white; }

/* ===== MAIN ===== */
main {
position: relative;
z-index: 1;
max-width: 1000px;
margin: 0 auto;
padding: 1.5rem;
}

.view { display: none; }
.view.active { display: block; animation: fadeUp 0.35s ease; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

/* ===== CALENDAR SECTION ===== */
.page-title {
font-family: ‘Nunito’, sans-serif;
font-size: 1.05rem;
font-weight: 800;
margin-bottom: 1.2rem;
color: var(–text);
display: flex;
align-items: center;
gap: 0.5rem;
}

.page-title .emoji { font-size: 1.2rem; }

.admin-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }

.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 1.4rem;
}

/* Calendar */
.cal-nav {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 1rem;
}

.cal-title {
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 1rem;
}

.nav-btn {
width: 32px; height: 32px;
border-radius: 8px;
border: 1px solid var(–border);
background: var(–surface2);
color: var(–muted);
cursor: pointer;
font-size: 1rem;
display: flex; align-items: center; justify-content: center;
transition: all 0.15s;
}
.nav-btn:hover { background: var(–accent); color: white; border-color: var(–accent); }

.cal-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
}

.cal-head {
text-align: center;
font-size: 0.65rem;
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
color: var(–muted);
padding: 0.3rem 0;
letter-spacing: 0.05em;
}

.cal-day {
aspect-ratio: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
font-size: 0.78rem;
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
border-radius: 8px;
cursor: pointer;
border: 1.5px solid transparent;
transition: all 0.15s;
position: relative;
gap: 1px;
}

.cal-day:hover:not(.past):not(.empty) {
background: var(–surface2);
border-color: var(–accent);
}

.cal-day.today { color: var(–accent); }
.cal-day.today::after { content: ‘’; width: 4px; height: 4px; background: var(–accent); border-radius: 50%; position: absolute; bottom: 3px; }
.cal-day.selected { background: var(–accent); color: white; border-color: var(–accent); }
.cal-day.past { opacity: 0.3; cursor: default; }
.cal-day.empty { cursor: default; }

/* availability dot */
.avail-dot {
width: 6px; height: 6px;
border-radius: 50%;
flex-shrink: 0;
}

/* ===== SLOT PANEL ===== */
.slot-panel { margin-top: 1rem; }

.slot-panel-title {
font-size: 0.8rem;
font-weight: 700;
color: var(–muted);
margin-bottom: 0.8rem;
font-family: ‘Nunito’, sans-serif;
}

.slot-add-row {
display: flex;
gap: 0.5rem;
align-items: center;
flex-wrap: wrap;
}

input[type=“time”] {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
padding: 0.45rem 0.7rem;
font-size: 0.82rem;
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
outline: none;
transition: border 0.15s;
width: 100px;
}
input[type=“time”]:focus { border-color: var(–accent); }

.chip-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.8rem; min-height: 28px; }

.chip {
display: flex;
align-items: center;
gap: 0.35rem;
padding: 0.3rem 0.7rem;
border-radius: 20px;
font-size: 0.72rem;
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
border: 1px solid;
}

.chip.ok-chip { background: var(–ok-bg); border-color: rgba(74,222,128,0.3); color: var(–ok); }
.chip.ng-chip { background: var(–ng-bg); border-color: rgba(248,113,113,0.3); color: var(–ng); }

.chip-del {
cursor: pointer;
opacity: 0.6;
font-size: 0.9rem;
line-height: 1;
transition: opacity 0.15s;
}
.chip-del:hover { opacity: 1; }

/* ===== BUTTONS ===== */
.btn {
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 0.78rem;
padding: 0.45rem 1rem;
border-radius: 9px;
border: none;
cursor: pointer;
transition: all 0.15s;
letter-spacing: 0.02em;
}

.btn-primary {
background: var(–accent);
color: white;
}
.btn-primary:hover { background: #9584ff; transform: translateY(-1px); }

.btn-ok {
background: var(–ok-bg);
border: 1px solid rgba(74,222,128,0.4);
color: var(–ok);
}
.btn-ok:hover { background: rgba(74,222,128,0.2); }

.btn-ng {
background: var(–ng-bg);
border: 1px solid rgba(248,113,113,0.4);
color: var(–ng);
}
.btn-ng:hover { background: rgba(248,113,113,0.2); }

.btn-ghost {
background: var(–surface2);
border: 1px solid var(–border);
color: var(–muted);
}
.btn-ghost:hover { color: var(–text); border-color: var(–muted); }

/* ===== AVAILABILITY TABLE ===== */
.avail-table-wrap {
overflow-x: auto;
margin-top: 0.5rem;
}

table.avail-table {
width: 100%;
border-collapse: separate;
border-spacing: 0 3px;
font-size: 0.82rem;
}

.avail-table th {
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
font-size: 0.65rem;
color: var(–muted);
letter-spacing: 0.06em;
padding: 0 0.8rem 0.6rem;
text-align: left;
}

.avail-table td {
padding: 0.7rem 0.8rem;
background: var(–surface2);
}

.avail-table tr td:first-child { border-radius: 10px 0 0 10px; }
.avail-table tr td:last-child { border-radius: 0 10px 10px 0; }

.avail-badge {
display: inline-flex;
align-items: center;
justify-content: center;
width: 34px;
height: 34px;
border-radius: 50%;
font-size: 1.1rem;
font-weight: 700;
border: 2px solid;
}

.avail-badge.ok { background: var(–ok-bg); border-color: var(–ok); color: var(–ok); }
.avail-badge.ng { background: var(–ng-bg); border-color: var(–ng); color: var(–ng); }
.avail-badge.maybe { background: var(–maybe-bg); border-color: var(–maybe); color: var(–maybe); }

.date-cell {
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
white-space: nowrap;
}

.time-cell {
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
font-size: 0.78rem;
color: var(–muted);
}

/* ===== REQUESTS ===== */
.req-card {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 14px;
padding: 1.1rem 1.3rem;
margin-bottom: 0.7rem;
transition: border-color 0.2s;
animation: fadeUp 0.3s ease;
}
.req-card:hover { border-color: var(–accent); }

.req-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: 0.5rem;
}

.req-name {
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 0.95rem;
}

.status-pill {
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 0.65rem;
padding: 0.2rem 0.6rem;
border-radius: 20px;
letter-spacing: 0.05em;
}
.status-pill.pending { background: rgba(251,191,36,0.15); color: var(–maybe); border: 1px solid rgba(251,191,36,0.3); }
.status-pill.approved { background: var(–ok-bg); color: var(–ok); border: 1px solid rgba(74,222,128,0.3); }
.status-pill.rejected { background: var(–ng-bg); color: var(–ng); border: 1px solid rgba(248,113,113,0.3); }

.req-date {
font-family: ‘Nunito’, sans-serif;
font-size: 0.8rem;
font-weight: 700;
color: var(–accent);
margin-bottom: 0.3rem;
}

.req-comment {
font-size: 0.8rem;
color: var(–muted);
margin-bottom: 0.8rem;
line-height: 1.5;
}

.req-actions { display: flex; gap: 0.5rem; }

/* ===== APPLY VIEW ===== */
.apply-wrap {
max-width: 900px;
margin: 0 auto;
}

.apply-hero {
text-align: cente
